services:
  db:
    image: postgres:${POSTGRES_VERSION:-16}
    env_file: .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - odoo-db-data:/var/lib/postgresql/data
    restart: always
    networks: [backend]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: >
      postgres
      -c max_connections=200
      -c shared_buffers=256MB
      -c effective_cache_size=768MB
      -c work_mem=4MB

  odoo-perms:
    image: odoo:${ODOO_VERSION:-18.0}
    user: root
    entrypoint: []
    command:
      - sh
      - -c
      - mkdir -p /var/lib/odoo/sessions /var/lib/odoo/filestore /var/log/odoo && chown -R odoo:odoo /var/lib/odoo /var/log/odoo
    volumes:
      - odoo-web-data:/var/lib/odoo
      - odoo-logs:/var/log/odoo
    restart: "no"

  odoo:
    image: odoo:${ODOO_VERSION:-18.0}
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      odoo-perms:
        condition: service_completed_successfully
    environment:
      HOST: db
      PORT: 5432
      USER: ${DB_USER}
      PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      LOG_LEVEL: ${LOG_LEVEL:-warn}
      WORKERS: ${WORKERS:-4}
    expose:
      - "8069"
    volumes:
      - odoo-web-data:/var/lib/odoo
      - odoo-logs:/var/log/odoo
      - ./addons:/mnt/extra-addons:ro
      - ./docker/entrypoint.sh:/entrypoint.sh
    entrypoint: ["/entrypoint.sh"]
    command: odoo
    restart: always
    networks: [backend]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8069/web/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - odoo
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/odoo.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-webroot:/var/www/certbot:ro
      - certbot-certs:/etc/letsencrypt:ro
      - nginx-logs:/var/log/nginx
    restart: always
    networks: [backend, public]

  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot-webroot:/var/www/certbot
      - certbot-certs:/etc/letsencrypt
    # Run manually: docker compose -f docker-compose.prod.yml run --rm certbot certonly ...
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot; sleep 12h; done"
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    env_file: .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data:/data
    expose:
      - "9000"
      - "9001"
    command: server /data --console-address ":9001"
    restart: always
    networks: [backend]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  public:
  backend:

volumes:
  odoo-db-data:
  odoo-web-data:
  odoo-logs:
  nginx-logs:
  certbot-webroot:
  certbot-certs:
  minio-data:
