name: project_management tests

on:
  pull_request:
    branches: [main, master, integration]
  workflow_dispatch:

jobs:
  odoo-tests:
    runs-on: ubuntu-latest
    container:
      image: odoo:18
      options: --user root
    services:
      db:
        image: postgres:16
        env:
          POSTGRES_DB: odoo_test
          POSTGRES_USER: odoo
          POSTGRES_PASSWORD: odoo
        options: >-
          --health-cmd "pg_isready -U odoo -d odoo_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      DB_NAME: odoo_test
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: odoo
      DB_PASSWORD: odoo
      ODOO_MODULE: project_management

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        shell: bash
        run: |
          set -euo pipefail
          apt-get update
          apt-get install -y postgresql-client

      - name: Python syntax check (models/tests)
        shell: bash
        run: |
          set -euo pipefail
          MODULE_DIR="$GITHUB_WORKSPACE/addons/project_management"
          if [ -d "$MODULE_DIR/models" ]; then
            python3 -m compileall -q "$MODULE_DIR/models"
          fi
          if [ -d "$MODULE_DIR/tests" ]; then
            python3 -m compileall -q "$MODULE_DIR/tests"
          fi

      - name: Wait for PostgreSQL
        shell: bash
        env:
          PGPASSWORD: odoo
        run: |
          set -euo pipefail
          for i in $(seq 1 30); do
            pg_isready -h "$DB_HOST" -p "$DB_PORT" -U "$DB_USER" -d "$DB_NAME" && exit 0
            sleep 2
          done
          echo "PostgreSQL did not become ready"
          exit 1

      - name: Test install
        shell: bash
        run: |
          set -euo pipefail
          ADDONS_PATH="/usr/lib/python3/dist-packages/odoo/addons,$(dirname "$GITHUB_WORKSPACE")"
          odoo -d "$DB_NAME" \
            --db_host="$DB_HOST" \
            --db_port="$DB_PORT" \
            --db_user="$DB_USER" \
            --db_password="$DB_PASSWORD" \
            --addons-path="$ADDONS_PATH" \
            -i "$ODOO_MODULE" \
            --test-enable \
            --test-tags="/$ODOO_MODULE" \
            --without-demo=all \
            --workers=0 \
            --stop-after-init \
            --log-level=test \
            2>&1 | tee odoo-test-install.log

      - name: Check for test failures in install log
        shell: bash
        run: |
          set -euo pipefail
          if grep -qE "FAILED|ERROR:odoo\.tests" odoo-test-install.log; then
            echo "❌ Test failures detected in install log"
            grep -E "FAILED|ERROR:odoo\.tests" odoo-test-install.log
            exit 1
          fi
          echo "✅ Install tests passed"

      - name: Test update
        shell: bash
        run: |
          set -euo pipefail
          ADDONS_PATH="/usr/lib/python3/dist-packages/odoo/addons,$(dirname "$GITHUB_WORKSPACE")"
          odoo -d "$DB_NAME" \
            --db_host="$DB_HOST" \
            --db_port="$DB_PORT" \
            --db_user="$DB_USER" \
            --db_password="$DB_PASSWORD" \
            --addons-path="$ADDONS_PATH" \
            -u "$ODOO_MODULE" \
            --test-enable \
            --test-tags="/$ODOO_MODULE" \
            --without-demo=all \
            --workers=0 \
            --stop-after-init \
            --log-level=test \
            2>&1 | tee odoo-test-update.log

      - name: Check for test failures in update log
        shell: bash
        run: |
          set -euo pipefail
          if grep -qE "FAILED|ERROR:odoo\.tests" odoo-test-update.log; then
            echo "❌ Test failures detected in update log"
            grep -E "FAILED|ERROR:odoo\.tests" odoo-test-update.log
            exit 1
          fi
          echo "✅ Update tests passed"

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: odoo-test-logs
          path: |
            odoo-test-install.log
            odoo-test-update.log
