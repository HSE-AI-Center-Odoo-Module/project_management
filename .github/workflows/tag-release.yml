name: Tag Release

# Больше не триггерится на push в main напрямую.
# Запускается только через workflow_dispatch из deploy.yml
# после успешного post-deploy health check.
on:
  workflow_dispatch:
    inputs:
      triggered_by_deploy:
        description: "Set to true only when called from deploy.yml"
        required: false
        default: "false"
        type: string

permissions:
  contents: write

jobs:
  tag-version:
    name: Compute and Push Tag
    runs-on: ubuntu-latest
    # Дополнительная защита: не запускаться если вызвано вручную без флага
    if: ${{ github.event.inputs.triggered_by_deploy == 'true' }}
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect merge source branch
        id: detect
        shell: bash
        run: |
          set -euo pipefail
          MSG="$(git log -1 --pretty=%B)"
          echo "Last commit message: $MSG"

          if echo "$MSG" | grep -Eq "from .*/integration|from integration"; then
            echo "from_integration=true" >> "$GITHUB_OUTPUT"
          else
            echo "from_integration=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip if not an integration merge
        if: steps.detect.outputs.from_integration != 'true'
        run: |
          echo "ℹ️ Last commit is not a merge from integration. Skipping tag."

      - name: Compute next patch tag
        if: steps.detect.outputs.from_integration == 'true'
        id: next
        shell: bash
        run: |
          set -euo pipefail
          LAST_TAG="$(git tag --list 'v*' --sort=-v:refname | head -n 1)"

          if [ -z "$LAST_TAG" ]; then
            NEXT_TAG="v0.1.0"
          else
            VERSION="${LAST_TAG#v}"
            IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
            PATCH=$((PATCH + 1))
            NEXT_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          fi

          echo "next_tag=$NEXT_TAG" >> "$GITHUB_OUTPUT"
          echo "Next tag: $NEXT_TAG"

      - name: Create and push tag
        if: steps.detect.outputs.from_integration == 'true'
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ steps.next.outputs.next_tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG — deployed successfully"
          git push origin "$TAG"
          echo "🏷️ Tagged $TAG"
