# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name ${DOMAIN};

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — main Odoo server
server {
    listen 443 ssl;
    http2 on;
    server_name ${DOMAIN};

    ssl_certificate     /etc/letsencrypt/live/${DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${DOMAIN}/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;

    # Upload size limit (documents, attachments)
    client_max_body_size 100m;

    # Proxy timeouts
    proxy_read_timeout   720s;
    proxy_connect_timeout 720s;
    proxy_send_timeout   720s;

    # Common proxy headers
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $host;

    # WebSocket (real-time notifications)
    location /websocket {
        proxy_pass         http://odoo:8069/websocket;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
    }

    # Long-polling (chat, notifications)
    location /longpolling/ {
        proxy_pass http://odoo:8069/longpolling/;
    }

    # Static files — cache aggressively
    location ~* /web/static/ {
        proxy_pass         http://odoo:8069;
        proxy_cache_valid  200 90d;
        expires            max;
        add_header         Cache-Control "public, immutable";
    }

    # Everything else → Odoo
    location / {
        proxy_pass       http://odoo:8069;
        proxy_redirect   off;
    }

    # Gzip compression
    gzip             on;
    gzip_min_length  1000;
    gzip_types       text/plain text/css application/json application/javascript text/xml application/xml;
}
